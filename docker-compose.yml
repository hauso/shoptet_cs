services:
  database:
    container_name: shoptet_cs-db
    image: mariadb:10.11
    environment:
      MARIADB_DATABASE: app
      MARIADB_USER: app
      MARIADB_PASSWORD: app
      MARIADB_ROOT_PASSWORD: root
    ports: ['3306:3306']
    volumes: ['db-data:/var/lib/mysql']

  adminer:
    container_name: shoptet_cs-adminer
    image: adminer:latest
    ports: ['8081:8080']
    depends_on: [database]

  php:
    container_name: shoptet_cs-php
    build: docker/php
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /app
    environment:
      COMPOSER_HOME: /tmp/composer
    volumes: ['.:/app']
    depends_on: [database]

  nginx:
    container_name: shoptet_cs-nginx
    image: nginx:1.27-alpine
    ports: ['8080:80']
    volumes: ['.:/app', './docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro']
    depends_on: [php]

volumes:
  db-data:
